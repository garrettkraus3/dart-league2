<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff9f0"/>
      <stop offset="100%" stop-color="#ffe8c8"/>
    </radialGradient>
    <radialGradient id="bull" cx="42%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#cc2222"/>
    </radialGradient>
    <linearGradient id="dropBlue" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#a8e6ff"/>
      <stop offset="100%" stop-color="#3ab0e8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="4" stdDeviation="4" flood-color="#f4a04a" flood-opacity="0.4"/>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#00000033"/>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-color="#e07020" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Warm cream background -->
  <rect width="400" height="400" fill="url(#bg)" rx="40"/>

  <!-- Wonky dotted border -->
  <rect x="10" y="10" width="380" height="380" rx="32" fill="none" stroke="#f4a04a" stroke-width="3" stroke-dasharray="10 6"/>

  <!-- DARTBOARD -->
  <circle cx="200" cy="178" r="128" fill="#2b2b2b" filter="url(#shadow)"/>
  <circle cx="200" cy="178" r="120" fill="#f5f0e0"/>
  <circle cx="200" cy="178" r="108" fill="#3cb371"/>
  <circle cx="200" cy="178" r="96" fill="#2b2b2b"/>
  <circle cx="200" cy="178" r="82" fill="#f5f0e0"/>
  <circle cx="200" cy="178" r="68" fill="#3cb371"/>
  <circle cx="200" cy="178" r="52" fill="#2b2b2b"/>
  <circle cx="200" cy="178" r="34" fill="#3cb371"/>
  <circle cx="200" cy="178" r="18" fill="url(#bull)"/>
  <ellipse cx="194" cy="172" rx="6" ry="4" fill="white" opacity="0.4"/>

  <!-- Board dividing lines -->
  <line x1="200" y1="50" x2="200" y2="306" stroke="#2b2b2b" stroke-width="2.5" opacity="0.5"/>
  <line x1="72" y1="178" x2="328" y2="178" stroke="#2b2b2b" stroke-width="2.5" opacity="0.5"/>
  <line x1="109" y1="87" x2="291" y2="269" stroke="#2b2b2b" stroke-width="2" opacity="0.35"/>
  <line x1="291" y1="87" x2="109" y2="269" stroke="#2b2b2b" stroke-width="2" opacity="0.35"/>

  <!-- WATER DROPS with faces -->
  <!-- Drop 1 - left -->
  <g transform="rotate(-15, 112, 225)">
    <path d="M112 200 Q105 214 101 222 Q97 232 97 238 Q97 250 112 252 Q127 250 127 238 Q127 232 123 222 Q119 214 112 200Z" fill="url(#dropBlue)" filter="url(#softShadow)"/>
    <ellipse cx="106" cy="220" rx="4" ry="6" fill="white" opacity="0.35"/>
    <circle cx="106" cy="234" r="1.8" fill="#1a6a99"/>
    <circle cx="118" cy="234" r="1.8" fill="#1a6a99"/>
    <path d="M105 240 Q112 245 119 240" fill="none" stroke="#1a6a99" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Drop 2 - right -->
  <g transform="rotate(10, 292, 230)">
    <path d="M292 198 Q283 214 278 224 Q273 236 273 244 Q273 260 292 263 Q311 260 311 244 Q311 236 306 224 Q301 214 292 198Z" fill="url(#dropBlue)" filter="url(#softShadow)"/>
    <ellipse cx="284" cy="218" rx="5" ry="8" fill="white" opacity="0.35"/>
    <circle cx="285" cy="240" r="2" fill="#1a6a99"/>
    <circle cx="299" cy="240" r="2" fill="#1a6a99"/>
    <path d="M283 248 Q292 254 301 248" fill="none" stroke="#1a6a99" stroke-width="1.8" stroke-linecap="round"/>
  </g>

  <!-- Drop 3 - tiny top right -->
  <g transform="rotate(20, 300, 120)">
    <path d="M300 104 Q295 112 292 117 Q289 123 289 127 Q289 135 300 137 Q311 135 311 127 Q311 123 308 117 Q305 112 300 104Z" fill="#7dd8f8" opacity="0.85"/>
    <ellipse cx="296" cy="114" rx="2.5" ry="3.5" fill="white" opacity="0.4"/>
  </g>

  <!-- Splash marks around bullseye -->
  <g opacity="0.7">
    <line x1="200" y1="152" x2="200" y2="144" stroke="#3ab0e8" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="215" y1="157" x2="220" y2="151" stroke="#3ab0e8" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="184" y1="157" x2="179" y2="151" stroke="#3ab0e8" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="222" y1="172" x2="230" y2="170" stroke="#3ab0e8" stroke-width="2" stroke-linecap="round"/>
    <line x1="177" y1="172" x2="169" y2="170" stroke="#3ab0e8" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- DART - chunky cartoon -->
  <g transform="rotate(-40, 200, 178)" filter="url(#softShadow)">
    <polygon points="200,178 204,190 196,190" fill="#d0d0d0"/>
    <rect x="195" y="190" width="10" height="26" fill="#e0e0e0" rx="2"/>
    <rect x="195" y="194" width="10" height="3" fill="#bbb" rx="0.5"/>
    <rect x="195" y="200" width="10" height="3" fill="#bbb" rx="0.5"/>
    <rect x="195" y="206" width="10" height="3" fill="#bbb" rx="0.5"/>
    <rect x="196.5" y="216" width="7" height="28" fill="#ff7f2a" rx="1"/>
    <polygon points="200,244 188,282 197,244" fill="#ffd700"/>
    <polygon points="200,244 212,282 203,244" fill="#f0c000"/>
    <polygon points="200,246 191,265 197,246" fill="white" opacity="0.25"/>
  </g>

  <!-- Sparkles -->
  <text x="60" y="148" font-size="22" opacity="0.75">&#11088;</text>
  <text x="316" y="145" font-size="18" opacity="0.65">&#10024;</text>
  <text x="74" y="312" font-size="16" opacity="0.5">&#128167;</text>
  <text x="308" y="310" font-size="16" opacity="0.5">&#128167;</text>

  <!-- TEXT -->
  <text x="200" y="354"
        font-family="'Arial Rounded MT Bold', Arial Black, Arial, sans-serif"
        font-size="46"
        font-weight="900"
        letter-spacing="3"
        text-anchor="middle"
        fill="#ff5a1f"
        filter="url(#textShadow)">SWEET</text>

  <text x="200" y="386"
        font-family="'Arial Rounded MT Bold', Arial Black, Arial, sans-serif"
        font-size="22"
        font-weight="700"
        letter-spacing="7"
        text-anchor="middle"
        fill="#3ab0e8">RELEASE</text>


</svg>
